<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#0b0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>claude-deck</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <!-- CDN: jsdelivr (cdnjs ya no hostea @xterm/addon-fit ni los bundles de diff2html) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.52/bundles/css/diff2html.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/styles/github-dark.min.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <!-- ============ Pestaña Claude ============ -->
    <section id="view-claude" class="view active">
      <div class="session-row">
        <div id="session-chips" class="chips"></div>
        <button id="btn-new-session" class="chip chip-add" title="Nueva sesión">+</button>
        <span class="conn" id="conn-claude"><span class="dot"></span></span>
      </div>
      <div id="hint-claude" class="hint hidden">
        Sesión tmux nueva y vacía — escribí <code>claude --continue</code> para retomar la última conversación del repo. <span class="hint-close">✕</span>
      </div>
      <div id="term-claude" class="term-wrap"></div>

      <!-- controles en la zona del pulgar, arriba de la tab bar -->
      <div class="controlbar">
        <div id="img-chip" class="img-chip hidden">
          <img id="img-chip-thumb" alt="" />
          <div class="img-chip-info">
            <div id="img-chip-title"></div>
            <div id="img-chip-meta"></div>
            <div id="img-chip-hint">Tocá la imagen para enviarla &middot; ✕ para descartar</div>
          </div>
          <button id="img-chip-close" title="Descartar">&#10005;</button>
        </div>
        <div id="switch-menu" class="switch-menu hidden"></div>
        <div class="controlrow switchrow">
          <button id="btn-mode" class="switch-pill">
            <span class="pill-left"><span id="mode-label">Mode switcher</span></span>
            <span class="pill-chev">&#8644;</span>
          </button>
          <button id="btn-model" class="switch-pill">
            <span class="pill-left"><span class="model-star">&#10022;</span><span id="model-label">Modelo</span></span>
            <span class="pill-right"><span id="effort-label" class="pill-muted"></span><span class="pill-chev">&#9662;</span></span>
          </button>
        </div>
        <div class="controlrow quickkeys" data-term="claude">
          <button id="btn-attach" class="ctl-sq" title="Adjuntar: c&aacute;mara o portapapeles">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <input id="img-input" type="file" accept="image/*" class="hidden" />
          <span class="ctl-div"></span>
          <button data-k="nl" title="Salto de l&iacute;nea (sin enviar)">\n</button>
          <button data-k="slash">/</button>
          <button data-k="esc">esc</button>
          <button data-k="up">&#8593;</button>
          <button data-k="down">&#8595;</button>
          <button data-k="tab">tab</button>
          <button data-k="ctrlc">ctrl+c</button>
        </div>
      </div>
    </section>

    <!-- ============ Pestaña Cambios ============ -->
    <section id="view-changes" class="view">
      <div class="changes-header">
        <button id="btn-diff-back" class="icon-btn hidden">&#8592;</button>
        <div class="branch-info">
          <span id="git-branch">&#8942;</span>
          <span id="git-ab" class="muted"></span>
        </div>
        <button id="btn-refresh" class="icon-btn">&#10227;</button>
      </div>
      <div id="file-list" class="scroll"></div>
      <div id="diff-view" class="scroll hidden"></div>
    </section>

    <!-- ============ Pestaña Archivos ============ -->
    <section id="view-files" class="view">
      <div class="changes-header">
        <button id="btn-file-back" class="icon-btn hidden">&#8592;</button>
        <div class="branch-info">
          <span id="files-title">Archivos</span>
        </div>
        <button id="btn-md-render" class="icon-btn hidden" title="Vista renderizada">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 12s3.5-6.2 9.5-6.2S21.5 12 21.5 12s-3.5 6.2-9.5 6.2S2.5 12 2.5 12z"/><circle cx="12" cy="12" r="3.1"/></svg>
        </button>
        <button id="btn-files-refresh" class="icon-btn">&#10227;</button>
      </div>
      <div id="file-tree" class="scroll"></div>
      <div id="file-view" class="scroll hidden"></div>
    </section>

    <!-- ============ Tab bar ============ -->
    <nav class="tabbar">
      <button class="tab active" data-tab="claude">
        <span class="tab-icon">&#9670;</span><span>Claude</span>
      </button>
      <button class="tab" data-tab="changes">
        <span class="tab-icon">&#916;</span><span>Cambios</span>
        <span id="tab-changes-badge" class="tab-badge hidden"></span>
      </button>
      <button class="tab" data-tab="files">
        <span class="tab-icon">&#9636;</span><span>Archivos</span>
      </button>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.52/bundles/js/diff2html.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
